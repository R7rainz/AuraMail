name: CI/CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: app/backend/go.mod
          cache: true
          cache-dependency-path: app/backend/go.sum
      - name: Install dependencies
        run: go mod download
      - name: Build
        run: go build -o backend ./cmd/backend/
      - name: Run tests
        run: go test ./... -v

  build-and-test-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: app/frontend/pnpm-lock.yaml
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm run lint
      - name: Build
        run: pnpm run build

  build-docker-images:
    runs-on: ubuntu-latest
    needs: [build-and-test-backend, build-and-test-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t auramail-backend ./app/backend
      - name: Build frontend Docker image
        run: docker build -t auramail-frontend ./app/frontend

# To enable deployment, add a deploy job here (e.g., push to Docker registry, SSH to server, or use cloud provider actions)
